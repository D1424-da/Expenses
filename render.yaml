# Render Blueprint（Docker 不要・Python ネイティブ）。
# Render ダッシュボードの「New +」→「Blueprint」でこのリポジトリを選ぶと、
# このファイルに従ってサービスが作成される。
#
# GEMINI_API_KEY と CORS_ORIGINS は sync:false なので、作成時にダッシュボードで入力する
# （= キーを Git に残さない）。
services:
  - type: web
    name: receipt-ocr
    runtime: python
    plan: free
    healthCheckPath: /api/health
    buildCommand: pip install -r requirements-gemini.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"   # Docker(python:3.11-slim)と揃える
      - key: FIREBASE_PROJECT_ID
        sync: false   # 設定すると /api/ocr を Firebase 認証必須にできる（任意）
      - key: RATE_PER_IP
        value: "10"   # IPあたり/分（簡易レート制限）
      - key: RATE_GLOBAL
        value: "60"   # 全体/分
      - key: OCR_ENGINE
        value: gemini   # gemini=Developer API / vertex=Vertex AI(Google Cloud課金)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: CORS_ORIGINS
        sync: false   # 例: https://<ユーザー名>.github.io
      - key: GEMINI_API_KEY
        sync: false   # OCR_ENGINE=gemini 用。Cloud Shell で取得したキー（ダッシュボードで入力）
      - key: VISION_API_KEY
        sync: false   # 保険: AI 失敗時の Vision API フォールバック用（任意・ダッシュボードで入力）
      # ---- OCR_ENGINE=vertex（Vertex AI）を使う場合のみ設定 ----
      - key: GOOGLE_CLOUD_PROJECT
        sync: false   # 無料トライアル課金が紐づく GCP プロジェクトID
      - key: VERTEX_LOCATION
        value: us-central1   # リージョン（global も可）
      - key: VERTEX_MODEL
        sync: false   # 任意。未設定なら GEMINI_MODEL を使用
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false   # サービスアカウント鍵のJSON文字列（aiplatform.user 権限）
