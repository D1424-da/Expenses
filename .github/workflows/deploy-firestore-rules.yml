name: Deploy Firestore Rules

# firestore.rules を変更して main にマージしたら自動デプロイする。
# （これまでルール変更が手動デプロイ頼りでセキュリティ反映漏れの恐れがあった）
on:
  push:
    branches: [main]
    paths:
      - firestore.rules
      - firebase.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      - name: Deploy Firestore rules
        env:
          # サービスアカウント JSON を GOOGLE_APPLICATION_CREDENTIALS で渡す。
          # Hosting と同じ FIREBASE_SERVICE_ACCOUNT シークレットを利用。
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/sa.json"
          firebase deploy --only firestore:rules --project expenses-9af61 --non-interactive
