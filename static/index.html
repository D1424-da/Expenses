<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>レシート家計簿</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ログイン画面（未ログイン時に表示） -->
  <div id="login-screen" class="login-screen" hidden>
    <div class="login-card">
      <h1>🧾 レシート家計簿</h1>
      <p>レシートを撮るだけで記録。<br />どの端末からでも同じデータを確認できます。</p>
      <button id="google-login" class="google-btn">
        <span class="g-icon">G</span> Google でログイン
      </button>
      <p id="login-error" class="login-error" hidden></p>
    </div>
  </div>

  <!-- アプリ本体（ログイン後に表示） -->
  <div id="app" hidden>
    <header class="topbar">
      <h1>🧾 レシート家計簿</h1>
      <div class="topbar-right">
        <div class="month-picker">
          <button id="prev-month" aria-label="前の月">‹</button>
          <span id="current-month"></span>
          <button id="next-month" aria-label="次の月">›</button>
        </div>
        <button id="compare-btn" class="logout-btn" title="商品の最安値">🔎 最安値</button>
        <button id="logout" class="logout-btn" title="ログアウト">ログアウト</button>
      </div>
    </header>

    <main>
      <!-- サマリー -->
      <section class="summary card">
        <div class="summary-total">
          <span class="label">今月の支出</span>
          <span id="summary-total" class="value">¥0</span>
          <span id="summary-count" class="sub"></span>
        </div>
        <div id="category-bars" class="category-bars"></div>
      </section>

      <!-- カレンダー（日ごとの買い物金額＋週間合計） -->
      <section class="card calendar-card">
        <div class="list-head">
          <h2>📅 買い物カレンダー</h2>
          <span class="hint cal-hint">日付をタップで入力・週計をタップで内訳</span>
        </div>
        <div id="calendar" class="calendar"></div>
      </section>

      <!-- レシート読み取り -->
      <section class="card capture">
        <h2>レシートを撮影 / 選択</h2>
        <p class="hint">その場で撮影するか、撮影済みの写真を複数選んで取り込めます。読み取り後に内容を確認して保存できます。</p>
        <div class="capture-buttons">
          <label class="file-button">
            📷 撮影する
            <input id="camera-input" type="file" accept="image/*" capture="environment" hidden />
          </label>
          <label class="file-button secondary">
            🖼️ 写真から選ぶ
            <input id="file-input" type="file" accept="image/*" multiple hidden />
          </label>
        </div>
        <div id="ocr-status" class="status" hidden></div>
      </section>

      <!-- 入力フォーム（OCR結果の確認・修正 / 手入力） -->
      <section class="card form-card" id="form-card">
        <h2 id="form-title">手入力で追加</h2>
        <p id="edit-banner" class="edit-banner" hidden></p>
        <form id="expense-form">
          <input type="hidden" id="f-id" />
          <input type="hidden" id="f-image-url" />
          <input type="hidden" id="f-rawtext" />
          <input type="hidden" id="f-engine" />

          <div class="row">
            <label>日付<input type="date" id="f-date" required /></label>
            <label>金額(円)<input type="number" id="f-amount" min="0" required /></label>
          </div>
          <div class="row">
            <label>店名<input type="text" id="f-store" placeholder="例: スーパー〇〇" /></label>
            <label>支店名<input type="text" id="f-branch" placeholder="例: 〇〇店" /></label>
          </div>
          <label>カテゴリ
            <select id="f-category"></select>
          </label>
          <label>メモ<input type="text" id="f-memo" placeholder="任意" /></label>

          <details id="items-details">
            <summary>明細（<span id="items-count">0</span>件）</summary>
            <div id="items-list" class="items-list"></div>
          </details>

          <div class="form-preview" id="form-preview" hidden>
            <img id="preview-img" alt="読み取ったレシート" />
          </div>

          <div class="form-actions">
            <button type="submit" class="primary" id="save-btn">保存</button>
            <button type="button" id="skip-btn" hidden>スキップ</button>
            <button type="button" id="reset-btn">クリア</button>
          </div>
        </form>
      </section>

      <!-- 店舗別一覧 -->
      <section class="card list-card">
        <div class="list-head">
          <h2>店舗別一覧</h2>
        </div>
        <div id="expense-list" class="expense-list"></div>
        <p id="empty-msg" class="empty" hidden>この月の記録はまだありません。</p>
      </section>
    </main>

    <!-- 商品の最安値（店舗横断で比較） -->
    <div id="compare-modal" class="modal" hidden>
      <div class="modal-box">
        <div class="modal-head">
          <h2>🔎 商品の最安値</h2>
          <button id="compare-close" aria-label="閉じる">✕</button>
        </div>
        <p class="hint">保存した明細を商品名でまとめ、最安の店を表示します。</p>
        <input id="compare-search" type="search" placeholder="商品名で検索（空欄で全件）" />
        <div id="compare-list" class="compare-list"></div>
      </div>
    </div>
    <!-- カレンダーの日付タップ → その日の買い物を確認・追加 -->
    <div id="day-modal" class="modal" hidden>
      <div class="modal-box">
        <div class="modal-head">
          <h2 id="day-modal-title">買い物</h2>
          <button id="day-close" aria-label="閉じる">✕</button>
        </div>
        <div class="day-total-line">
          <span class="label">この日の合計</span>
          <span id="day-total" class="value">¥0</span>
        </div>
        <div id="day-list" class="day-list"></div>
        <form id="day-form" class="day-form">
          <h3>この日に追加</h3>
          <div class="row">
            <label>金額(円)<input type="number" id="day-amount" min="0" placeholder="例: 1280" /></label>
            <label>カテゴリ<select id="day-category"></select></label>
          </div>
          <label>店名<input type="text" id="day-store" placeholder="任意" /></label>
          <button type="submit" class="primary">追加する</button>
        </form>
      </div>
    </div>
    <!-- 週計タップ → その週のカテゴリ別内訳（明細カテゴリで集計） -->
    <div id="week-modal" class="modal" hidden>
      <div class="modal-box">
        <div class="modal-head">
          <h2 id="week-modal-title">週の内訳</h2>
          <button id="week-close" aria-label="閉じる">✕</button>
        </div>
        <div class="day-total-line">
          <span class="label">週計</span>
          <span id="week-total" class="value">¥0</span>
        </div>
        <div id="week-bars" class="category-bars"></div>
      </div>
    </div>
  </div>

  <!-- ブラウザ内OCRは PaddleOCR(ppu-paddle-ocr + onnxruntime-web) を app.js から
       動的 import で読み込む（Gemini→Vision が両方失敗したときの最終フォールバック）。 -->
  <script type="module" src="app.js"></script>
</body>
</html>
