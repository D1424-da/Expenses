<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="redirect.js"></script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.json" />
  <title>お問い合わせ | カケイシピ</title>
  <meta name="description" content="カケイシピへのお問い合わせはこちらから。" />
  <link rel="canonical" href="https://get-tohon.online/contact.html" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--g1:#1E5C3A;--g2:#2D7D52;--bg:#F7FAF8;--sur:#FFFFFF;--bd:#D6E8DB;--ink:#0F2318;--ink2:#4A6355;--mute:#8AAA96}
    @media (prefers-color-scheme:dark){:root{--bg:#0C1A11;--sur:#132219;--bd:#1E3D2A;--ink:#E4EDE7;--ink2:#8ABFA0;--mute:#4A7A5C}}
    :root[data-theme="dark"]{--bg:#0C1A11;--sur:#132219;--bd:#1E3D2A;--ink:#E4EDE7;--ink2:#8ABFA0;--mute:#4A7A5C}
    :root[data-theme="light"]{--bg:#F7FAF8;--sur:#FFFFFF;--bd:#D6E8DB;--ink:#0F2318;--ink2:#4A6355;--mute:#8AAA96}
    body{font-family:"Hiragino Sans","Noto Sans CJK JP","Yu Gothic UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.8;font-size:16px}
    header{position:sticky;top:0;z-index:10;background:var(--g1);padding:0 24px;height:56px;display:flex;align-items:center}
    header a{color:#fff;text-decoration:none;font-weight:700;font-size:1.05rem}
    main{max-width:640px;margin:0 auto;padding:48px 24px 100px}
    h1{font-size:1.6rem;margin-bottom:16px}
    p{color:var(--ink2);font-size:.94rem;margin-bottom:16px}
    .box{background:var(--sur);border:1px solid var(--bd);border-radius:12px;padding:28px}
    .mail-btn{display:inline-block;margin-top:8px;background:var(--g2);color:#fff;text-decoration:none;padding:12px 24px;border-radius:100px;font-weight:700;font-size:.92rem}
    .mail-btn:hover{background:var(--g1)}
    footer{text-align:center;padding:32px;color:var(--mute);font-size:.82rem}
    footer a{color:var(--g2)}
  </style>
</head>
<body>
<header><a href="/">カケイシピ</a></header>
<main>
  <h1>お問い合わせ</h1>
  <div class="box">
    <p>サービスに関するご質問・不具合のご報告・アカウント削除のご依頼などは、以下のメールアドレスまでご連絡ください。内容を確認のうえ、順次ご返信いたします。</p>
    <a class="mail-btn" href="mailto:support@get-tohon.online?subject=【カケイシピ】お問い合わせ">✉️ メールでお問い合わせ</a>
    <p style="margin-top:20px;font-size:.82rem">通常2〜3営業日以内にご返信いたします。</p>
  </div>
</main>
<footer>
  <a href="/">ホーム</a> ・ <a href="/terms.html">利用規約</a> ・ <a href="/privacy.html">プライバシーポリシー</a> ・ <a href="/tokushoho.html">特定商取引法に基づく表記</a>
  <p style="margin-top:12px">© 2026 カケイシピ</p>
</footer>
</body>
</html>
